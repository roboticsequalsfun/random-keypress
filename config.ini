[Config]
; Time in milliseconds between key presses. IMPORTANT: Must be greater than 0!
pressDelay= 500
; Probability of pressing a key instead of the mouse
weight= 0.7
; Probability of pressing a normal key instead of a special key
keyWeight= 0.7
mouse= true

[Mouse]
maxClicks= 3
speed= 2

[buttons]
1=left
2=right
3=middle

[Specials]
1=^c
2=^v
3=!tab
4=#e
5=#s
6={Enter}
7={Space}

